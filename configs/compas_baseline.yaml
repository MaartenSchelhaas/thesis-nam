# COMPAS baseline experiment config
# All keys map directly to NAMConfig fields.
# Pass to train.py: python scripts/train.py --config configs/compas_baseline.yaml

dataset:
  path: datasets/raw/compas-scores-two-years.csv

model:
  num_units: 64
  hidden_sizes: [64, 32]
  activation: exu          # 'exu' or 'relu'
  dropout: 0.5
  feature_dropout: 0.0

regularization:
  output_regularization: 0.0
  l2_regularization: 0.0

optimizer:
  lr: 0.001
  decay_rate: 0.995

training:
  batch_size: 1024
  num_epochs: 1000
  patience: 60
  val_check_interval: 10
  task: classification      # 'classification' or 'regression'

split:
  val_frac: 0.15
  test_frac: 0.15
  seed: 42
