# COMPAS baseline

num_units: 64
hidden_sizes: [64, 32]
activation: exu
dropout: 0.5
feature_dropout: 0.0

output_regularization: 0.0
l2_regularization: 0.0

lr: 0.001
decay_rate: 0.995

batch_size: 1024
num_epochs: 1000
patience: 60
val_check_interval: 10
task: classification

val_frac: 0.15
test_frac: 0.15
seed: 42